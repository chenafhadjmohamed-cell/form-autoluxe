<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Auto Luxe Atelier</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
padding:20px;
margin:0;
}

.container{
max-width:650px;
margin:auto;
background:#1a1a1a;
padding:30px;
border-radius:12px;
border:2px solid #ffd000;
}

h2{
text-align:center;
color:#ffd000;
}

label{
font-weight:bold;
color:#ffd000;
display:block;
margin-top:15px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
border-radius:6px;
border:1px solid #444;
background:#111;
color:white;
}

button{
background:#ffd000;
color:black;
padding:14px;
border:none;
width:100%;
border-radius:6px;
font-size:16px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

/* TomSelect correction couleur */

.ts-control{
background:#111 !important;
color:white !important;
border:1px solid #444 !important;
}

.ts-dropdown{
background:#111 !important;
color:white !important;
}

/* Boutons radio design */

.radio-group{
display:flex;
gap:10px;
margin-top:10px;
}

.radio-card{
flex:1;
border:1px solid #444;
padding:12px;
border-radius:6px;
text-align:center;
cursor:pointer;
}

.radio-card input{
display:none;
}

.radio-card.active{
background:#ffd000;
color:black;
font-weight:bold;
}

/* Services design */

.services{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.service-card{
border:1px solid #444;
padding:12px;
border-radius:6px;
cursor:pointer;
}

.service-card input{
display:none;
}

.service-card.active{
background:#ffd000;
color:black;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Nouveau client</h2>

<form id="form">

<label>Marque *</label> <select id="marque"></select>

<label>Modèle *</label> <select id="modele"></select>

<label>Année *</label> <select id="annee"></select>

<label>Matricule</label> <input id="matricule">

<label>Toit ouvrant</label>

<div class="radio-group">

<label class="radio-card">
<input type="radio" name="toit" value="avec">
avec toit ouvrant
</label>

<label class="radio-card">
<input type="radio" name="toit" value="sans">
sans toit ouvrant
</label>

</div>

<label>Services</label>

<div class="services">

<label class="service-card">
<input type="checkbox" value="ciel">
Rénovation ciel de toit
</label>

<label class="service-card">
<input type="checkbox" value="rideau">
Rideau toit ouvrant
</label>

<label class="service-card">
<input type="checkbox" value="couleur">
Changement couleur
</label>

<label class="service-card">
<input type="checkbox" value="alcantara">
Alcantara
</label>

<label class="service-card">
<input type="checkbox" value="portes">
Tissu portes
</label>

<label class="service-card">
<input type="checkbox" value="etoile">
Ciel étoilé
</label>

</div>

<label>Remarques</label>

<textarea id="remarques"></textarea>

<label>Prénom</label> <input id="prenom">

<label>Nom</label> <input id="nom">

<label>Téléphone</label> <input id="tel">

<label>Prix</label> <input id="prix">

<button type="submit">Ajouter client</button>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1T7AJBCvfomGbjdrm3ydughenuqPdKpYHmmW4DD_sz2M/gviz/tq?tqx=out:csv&gid=0"

let database=[]
let modeleSelect

async function loadData(){

const res=await fetch(sheetURL)
const text=await res.text()

const rows=text.split("\n").slice(1)

rows.forEach(r=>{

const c=r.split(",")

database.push({

marque:c[0],
modele:c[1],
prix:c[5]

})

})

initBrands()
initYears()

new TomSelect("#marque",{create:true})
modeleSelect=new TomSelect("#modele",{create:true})

}

function initBrands(){

const marques=[...new Set(database.map(d=>d.marque))]

marques.forEach(m=>{

const opt=document.createElement("option")
opt.value=m
opt.textContent=m

marque.appendChild(opt)

})

}

function initYears(){

for(let y=1970;y<=2030;y++){

const opt=document.createElement("option")

opt.value=y
opt.textContent=y

annee.appendChild(opt)

}

}

marque.addEventListener("change",function(){

const models=database.filter(d=>d.marque===this.value)

modeleSelect.clearOptions()

models.forEach(m=>{

modeleSelect.addOption({
value:m.modele,
text:m.modele
})

})

modeleSelect.refreshOptions(false)

})

/* activation design */

document.querySelectorAll(".radio-card").forEach(card=>{
card.onclick=()=>{
document.querySelectorAll(".radio-card").forEach(c=>c.classList.remove("active"))
card.classList.add("active")
card.querySelector("input").checked=true
}
})

document.querySelectorAll(".service-card").forEach(card=>{
card.onclick=()=>{
card.classList.toggle("active")
card.querySelector("input").checked=!card.querySelector("input").checked
}
})

loadData()

</script>

</body>
</html>
