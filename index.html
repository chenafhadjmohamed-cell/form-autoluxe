<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Auto Luxe Atelier</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
padding:20px;
margin:0;
}

.container{
max-width:650px;
margin:auto;
background:#1a1a1a;
padding:30px;
border-radius:12px;
border:2px solid #ffd000;
}

h2{
text-align:center;
color:#ffd000;
}

label{
font-weight:bold;
color:#ffd000;
display:block;
margin-top:15px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
border-radius:6px;
border:1px solid #444;
background:#111;
color:white;
}

/* TOM SELECT */

.ts-control{
background:#111 !important;
color:white !important;
border:1px solid #444 !important;
}

.ts-dropdown{
background:#111 !important;
color:white !important;
}

/* TOIT OUVRANT */

.toit-group{
display:flex;
gap:10px;
margin-top:10px;
}

.toit-option{

flex:1;
border:1px solid #444;
padding:12px;
border-radius:6px;
text-align:center;
cursor:pointer;

}

.toit-option input{
display:none;
}

.toit-option.active{
background:#ffd000;
color:black;
font-weight:bold;
}

/* SERVICES */

.services{
margin-top:10px;
}

.service-row{

display:flex;
align-items:center;
gap:10px;

border:1px solid #444;
padding:12px;
border-radius:6px;
margin-bottom:8px;

cursor:pointer;

}

.service-row:hover{
border-color:#ffd000;
}

.service-row input{
display:none;
}

.service-box{

width:18px;
height:18px;

border:2px solid #ffd000;

border-radius:3px;

}

.service-row.active .service-box{
background:#ffd000;
}

button{

background:#ffd000;
color:black;
padding:14px;
border:none;
width:100%;
border-radius:6px;
font-size:16px;
font-weight:bold;
margin-top:20px;
cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<h2>Nouveau client</h2>

<form id="form">

<label>Marque</label> <select id="marque"></select>

<label>Modèle</label> <select id="modele"></select>

<label>Année</label> <select id="annee"></select>

<label>Matricule</label> <input id="matricule">

<label>Toit ouvrant</label>

<div class="toit-group">

<label class="toit-option">

<input type="radio" name="toit" value="avec">

avec toit ouvrant

</label>

<label class="toit-option">

<input type="radio" name="toit" value="sans">

sans toit ouvrant

</label>

</div>

<label>Services</label>

<div class="services">

<div class="service-row">
<div class="service-box"></div>
<input type="checkbox" value="Rénovation ciel de toit">
Rénovation ciel de toit
</div>

<div class="service-row">
<div class="service-box"></div>
<input type="checkbox" value="Rideau toit ouvrant">
Rideau toit ouvrant
</div>

<div class="service-row">
<div class="service-box"></div>
<input type="checkbox" value="Changement couleur">
Changement couleur ciel de toit
</div>

<div class="service-row">
<div class="service-box"></div>
<input type="checkbox" value="Alcantara">
Alcantara
</div>

<div class="service-row">
<div class="service-box"></div>
<input type="checkbox" value="Tissu portes">
Rénovation tissu portes
</div>

<div class="service-row">
<div class="service-box"></div>
<input type="checkbox" value="Ciel étoilé">
Ciel étoilé
</div>

</div>

<label>Remarques</label>

<textarea id="remarques"></textarea>

<label>Prénom</label> <input id="prenom">

<label>Nom</label> <input id="nom">

<label>Téléphone</label> <input id="tel">

<label>Prix</label> <input id="prix">

<button type="submit">Ajouter client</button>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1T7AJBCvfomGbjdrm3ydughenuqPdKpYHmmW4DD_sz2M/gviz/tq?tqx=out:csv&gid=0"

let database=[]
let modeleSelect

function clean(v){
return v.replace(/"/g,"").trim()
}

async function loadData(){

const res=await fetch(sheetURL)
const text=await res.text()

const rows=text.split("\n").slice(1)

rows.forEach(r=>{

const c=r.split(",")

database.push({

marque:clean(c[0]),
modele:clean(c[1])

})

})

initBrands()
initYears()

new TomSelect("#marque",{create:true})
modeleSelect=new TomSelect("#modele",{create:true})

}

function initBrands(){

const marques=[...new Set(database.map(d=>d.marque))]

marques.forEach(m=>{

const opt=document.createElement("option")
opt.value=m
opt.textContent=m

marque.appendChild(opt)

})

}

function initYears(){

for(let y=1970;y<=2030;y++){

const opt=document.createElement("option")

opt.value=y
opt.textContent=y

annee.appendChild(opt)

}

}

marque.addEventListener("change",function(){

const models=database.filter(d=>d.marque===this.value)

modeleSelect.clearOptions()

models.forEach(m=>{

modeleSelect.addOption({
value:m.modele,
text:m.modele
})

})

modeleSelect.refreshOptions(false)

})

/* TOIT */

document.querySelectorAll(".toit-option").forEach(card=>{

card.onclick=()=>{

document.querySelectorAll(".toit-option").forEach(c=>c.classList.remove("active"))

card.classList.add("active")

card.querySelector("input").checked=true

}

})

/* SERVICES */

document.querySelectorAll(".service-row").forEach(row=>{

row.onclick=()=>{

row.classList.toggle("active")

const checkbox=row.querySelector("input")

checkbox.checked=!checkbox.checked

}

})

loadData()

</script>

</body>

</html>
