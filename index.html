<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Auto Luxe Atelier</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

<style>

  .logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
max-width:260px;
width:100%;
height:auto;
}

body{
font-family:Arial;
background:#0f0f0f;
color:white;
padding:20px;
margin:0;
}

.container{
max-width:650px;
margin:auto;
background:#1a1a1a;
padding:30px;
border-radius:12px;
border:2px solid #ffd000;
}

h2{
text-align:center;
color:#ffd000;
}

label{
font-weight:bold;
color:#ffd000;
display:block;
margin-top:15px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
border-radius:6px;
border:1px solid #444;
background:#111;
color:white;
}

/* TOMSELECT */

.ts-control{
background:#111 !important;
color:white !important;
border:1px solid #444 !important;
}

.ts-dropdown{
background:#111 !important;
color:white !important;
}

/* TOIT */

.toit-group{
display:flex;
gap:10px;
margin-top:10px;
}

.toit-option{
flex:1;
border:1px solid #444;
padding:12px;
border-radius:6px;
text-align:center;
cursor:pointer;
}

.toit-option input{
display:none;
}

.toit-option.active{
background:#ffd000;
color:black;
font-weight:bold;
}

/* SERVICES */

.services{
margin-top:10px;
}

.service-row{

display:flex;
align-items:center;
gap:10px;

border:1px solid #444;
padding:12px;
border-radius:6px;
margin-bottom:8px;

cursor:pointer;

}

.service-row:hover{
border-color:#ffd000;
}

.service-row input{
display:none;
}

.service-box{
width:18px;
height:18px;
border:2px solid #ffd000;
border-radius:3px;
}

.service-row.active .service-box{
background:#ffd000;
}

button{
background:#ffd000;
color:black;
padding:14px;
border:none;
width:100%;
border-radius:6px;
font-size:16px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo-autoluxe.png">
</div>

<h2>Nouveau client</h2>

<form id="form">

<label>Marque</label> <select id="marque"></select>

<label>Modèle</label> <select id="modele"></select>

<label>Année</label> <select id="annee"></select>

<label>Matricule</label> <input id="matricule">

<label>Toit ouvrant</label>

<div class="toit-group">

<label class="toit-option">
<input type="radio" name="toit" value="avec">
avec toit ouvrant
</label>

<label class="toit-option">
<input type="radio" name="toit" value="sans">
sans toit ouvrant
</label>

</div>

<label>Services</label>

<div class="services">

<div class="service-row" data-service="ciel">
<div class="service-box"></div>
Rénovation ciel de toit
</div>

<div class="service-row" data-service="rideau">
<div class="service-box"></div>
Remplacement rideau du toit ouvrant
</div>

<div class="service-row" data-service="couleur">
<div class="service-box"></div>
Changement de couleur du ciel de toit avec tissu comme l'original + peintures du plastiques
</div>

<div class="service-row" data-service="alcantara">
<div class="service-box"></div>
Changement de couleur du ciel de toit en Alcantara + peintures du plastiques 
</div>

<div class="service-row" data-service="Ciel étoilé">
<div class="service-box"></div>
Ciel étoilé Pack 500 🌟
</div>

<div class="service-row" data-service="Ciel étoilé">
<div class="service-box"></div>
Ciel étoilé Pack 1000 🌟
</div>

</div>

  <label>Remarques</label>
<textarea id="remarques"></textarea>
  
<label>Prix</label>
<input id="prix">

<label>Prénom</label>
<input id="prenom">

<label>Nom de famille</label>
<input id="nom">

<label>Téléphone</label>
<input id="tel">

<label>Date du RDV</label>
<input id="daterdv">

<label>Heure d'arrivée</label>
<input id="heure">

<label>Date du montage (si nécessaire)</label>
<input id="datemontage">

<button type="submit">Ajouter client</button>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1T7AJBCvfomGbjdrm3ydughenuqPdKpYHmmW4DD_sz2M/gviz/tq?tqx=out:csv&gid=0"

let database=[]
let modeleSelect
let anneeSelect
let servicesSelectionnes=[]

function clean(v){
return v.replace(/"/g,"").trim()
}

async function loadData(){

const res=await fetch(sheetURL)
const text=await res.text()

const rows=text.split("\n").slice(1)

rows.forEach(r=>{

const c=r.split(",")

database.push({

marque:clean(c[0]),
modele:clean(c[1]),

annee_debut:parseInt(clean(c[2]))||0,
annee_fin:parseInt(clean(c[3]))||0,

prix_ciel:parseInt(clean(c[5]))||0,
prix_rideau:parseInt(clean(c[7]))||0,
prix_couleur:parseInt(clean(c[8]))||0,
prix_alcantara:parseInt(clean(c[9]))||0

})

})

initBrands()

new TomSelect("#marque",{create:true})

modeleSelect = new TomSelect("#modele",{create:true})

anneeSelect = new TomSelect("#annee",{create:true})

}

function initBrands(){

const marques=[...new Set(database.map(d=>d.marque))]

marques.forEach(m=>{

const opt=document.createElement("option")
opt.value=m
opt.textContent=m

marque.appendChild(opt)

})

}


marque.addEventListener("change",function(){

const models=database.filter(d=>d.marque===this.value)

modeleSelect.clearOptions()

models.forEach(m=>{

modeleSelect.addOption({
value:m.modele,
text:m.modele
})

})

modeleSelect.refreshOptions(false)

})

  modele.addEventListener("change",function(){

const marque=document.getElementById("marque").value
const modele=this.value

const voiture=database.find(v=>v.marque===marque && v.modele===modele)

if(!voiture)return

const selectAnnee=document.getElementById("annee")

anneeSelect.clearOptions()

for(let y=voiture.annee_debut;y<=voiture.annee_fin;y++){

const opt=document.createElement("option")

opt.value=y
opt.textContent=y

anneeSelect.addOption({
value:y,
text:y
})

}

anneeSelect.refreshOptions(false)

})

/* TOIT STYLE */

document.querySelectorAll(".toit-option").forEach(card=>{

card.onclick=()=>{

document.querySelectorAll(".toit-option").forEach(c=>c.classList.remove("active"))

card.classList.add("active")

card.querySelector("input").checked=true

}

})

/* SERVICES */

document.querySelectorAll(".service-row").forEach(row=>{

row.onclick=()=>{

row.classList.toggle("active")

const service=row.dataset.service

if(servicesSelectionnes.includes(service)){

servicesSelectionnes=servicesSelectionnes.filter(s=>s!==service)

}else{

servicesSelectionnes.push(service)

}

calculPrix()

}

})

function calculPrix(){

const marque=document.getElementById("marque").value
const modele=document.getElementById("modele").value

const voiture=database.find(v=>v.marque===marque && v.modele===modele)

if(!voiture)return

let total=0

servicesSelectionnes.forEach(s=>{

if(s==="ciel") total+=voiture.prix_ciel
if(s==="rideau") total+=voiture.prix_rideau
if(s==="couleur") total+=voiture.prix_couleur
if(s==="alcantara") total+=voiture.prix_alcantara

})

document.getElementById("prix").value=total

}

loadData()

</script>

</body>

</html>
