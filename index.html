<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Auto Luxe Atelier</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
padding:20px;
margin:0;
}

.container{
max-width:650px;
margin:auto;
background:#1a1a1a;
padding:30px;
border-radius:12px;
border:2px solid #ffd000;
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
max-width:180px;
}

h2{
text-align:center;
color:#ffd000;
margin-bottom:25px;
font-size:26px;
letter-spacing:2px;
}

label{
font-weight:bold;
color:#ffd000;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #444;
background:#111;
color:white;
font-size:16px;
}

button{
background:#ffd000;
color:black;
padding:14px;
border:none;
width:100%;
border-radius:6px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.ts-control{
background:#111 !important;
border:1px solid #444 !important;
color:white !important;
}

.ts-dropdown{
background:#111 !important;
color:white !important;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo-autoluxe.png">
</div>

<h2>Nouveau client</h2>

<form id="form">

<label>Marque</label>
<select id="marque"></select>

<label>Modèle</label>
<select id="modele"></select>

<label>Année</label>
<select id="annee"></select>

<label>Matricule</label>
<input id="matricule">

<label>Toit ouvrant</label>
<select id="toit">
<option>avec</option>
<option>sans</option>
</select>

<label>Service</label>

<select id="service">

<option value="prix_ciel">Rénovation ciel de toit</option>
<option value="prix_rideau">Remplacement rideau toit ouvrant</option>
<option value="prix_couleur">Changement couleur tissu</option>
<option value="prix_alcantara">Alcantara</option>

</select>

<label>Prix</label>
<input id="prix">

<label>Prénom</label>
<input id="prenom">

<label>Nom</label>
<input id="nom">

<label>Téléphone</label>
<input id="tel">

<label>Date rendez-vous</label>
<input type="date" id="date">

<label>Heure</label>
<input id="heure">

<button type="submit">Ajouter client</button>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1T7AJBCvfomGbjdrm3ydughenuqPdKpYHmmW4DD_sz2M/gviz/tq?tqx=out:csv&gid=0"

let database=[]
let marqueSelect
let modeleSelect

function clean(v){
return v.replace(/"/g,"").trim()
}

async function loadData(){

const res=await fetch(sheetURL)
const text=await res.text()

const rows=text.split("\n").slice(1)

rows.forEach(r=>{

const c=r.split(",")

database.push({

marque:clean(c[0]),
modele:clean(c[1]),
prix_ciel:clean(c[5]),
prix_rideau:clean(c[7]),
prix_couleur:clean(c[8]),
prix_alcantara:clean(c[9])

})

})

initBrands()
initYears()
initTomSelect()

}

function initBrands(){

const marques=[...new Set(database.map(d=>d.marque))]

const select=document.getElementById("marque")

marques.forEach(m=>{
const opt=document.createElement("option")
opt.value=m
opt.textContent=m
select.appendChild(opt)
})

}

function initYears(){

const select=document.getElementById("annee")

for(let y=1970;y<=2030;y++){

const opt=document.createElement("option")

opt.value=y
opt.textContent=y

select.appendChild(opt)

}

}

function initTomSelect(){

marqueSelect = new TomSelect("#marque",{create:true})
modeleSelect = new TomSelect("#modele",{create:true})

}

document.getElementById("marque").addEventListener("change",function(){

const marque=this.value

const models=database.filter(d=>d.marque===marque)

modeleSelect.clearOptions()

models.forEach(m=>{
modeleSelect.addOption({
value:m.modele,
text:m.modele
})
})

modeleSelect.refreshOptions(false)

})

document.getElementById("service").addEventListener("change",updatePrice)
document.getElementById("modele").addEventListener("change",updatePrice)

function updatePrice(){

const marque=document.getElementById("marque").value
const modele=document.getElementById("modele").value
const service=document.getElementById("service").value

const car=database.find(d=>d.marque===marque && d.modele===modele)

if(!car) return

const prix=car[service]

if(prix){
document.getElementById("prix").value=prix
}

}

document.getElementById("form").addEventListener("submit",async function(e){

e.preventDefault()

const data={

marque:document.getElementById("marque").value,
modele:document.getElementById("modele").value,
annee:document.getElementById("annee").value,
matricule:document.getElementById("matricule").value,
toit:document.getElementById("toit").value,
service:document.getElementById("service").value,
prix:document.getElementById("prix").value,
prenom:document.getElementById("prenom").value,
nom:document.getElementById("nom").value,
telephone:document.getElementById("tel").value,
date:document.getElementById("date").value,
heure:document.getElementById("heure").value

}

await fetch("https://n8n-hetzner.duckdns.org/webhook/nouveau-client",{

method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(data)

})

alert("Client ajouté")

})

loadData()

</script>

</body>
</html>
